name: Daily Price Update

on:
  schedule:
    - cron: '0 0,12 * * *'  # 매일 09:00, 21:00 KST
  workflow_dispatch:       # 수동 실행도 가능

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch latest prices and update
        env:
          STOCK_HOLDINGS: ${{ secrets.STOCK_HOLDINGS }}
          BTC_QTY: ${{ secrets.BTC_QTY }}
          ETH_QTY: ${{ secrets.ETH_QTY }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # Read fixed assets from data.json
          CASH=$(jq '.assets.cash.amount' data.json)
          REALESTATE=$(jq '.assets.realestate.amount' data.json)
          PENSION=$(jq '.assets.pension.amount' data.json)

          # Crypto: quantities from secrets, prices from API
          echo "Fetching crypto prices..."
          CRYPTO_PRICES=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")
          BTC_PRICE=$(echo "$CRYPTO_PRICES" | jq '.bitcoin.usd // 0')
          ETH_PRICE=$(echo "$CRYPTO_PRICES" | jq '.ethereum.usd // 0')

          if [ "$BTC_PRICE" = "0" ] || [ "$BTC_PRICE" = "null" ]; then
            echo "CoinGecko API failed, keeping existing crypto values"
            CRYPTO_TOTAL=$(jq '.assets.crypto.amount' data.json)
          else
            BTC_VALUE=$(echo "$BTC_QTY * $BTC_PRICE" | bc -l)
            ETH_VALUE=$(echo "$ETH_QTY * $ETH_PRICE" | bc -l)
            CRYPTO_TOTAL=$(echo "$BTC_VALUE + $ETH_VALUE" | bc -l)
          fi
          echo "Crypto total: $CRYPTO_TOTAL"

          # Stocks: holdings from secrets (TICKER:QTY,TICKER:QTY)
          echo "Fetching stock prices..."
          STOCKS_TOTAL=0

          if [ -n "$STOCK_HOLDINGS" ]; then
            IFS=',' read -ra PAIRS <<< "$STOCK_HOLDINGS"
            for pair in "${PAIRS[@]}"; do
              TICKER=$(echo "$pair" | cut -d: -f1 | tr -d ' ' | tr '[:lower:]' '[:upper:]')
              QTY=$(echo "$pair" | cut -d: -f2 | tr -d ' ')

              PRICE=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/$TICKER" \
                -H "User-Agent: Mozilla/5.0" | \
                jq '.chart.result[0].meta.regularMarketPrice // 0')

              if [ "$PRICE" = "0" ] || [ "$PRICE" = "null" ]; then
                echo "$TICKER: price fetch failed, skipping"
                continue
              fi

              VALUE=$(echo "$QTY * $PRICE" | bc -l)
              STOCKS_TOTAL=$(echo "$STOCKS_TOTAL + $VALUE" | bc -l)
              echo "$TICKER: $QTY x $PRICE = $VALUE"
            done
          fi

          # If stocks fetch failed entirely, keep existing
          if [ "$STOCKS_TOTAL" = "0" ]; then
            STOCKS_TOTAL=$(jq '.assets.stocks.amount' data.json)
          fi

          # Round values
          STOCKS_TOTAL=$(printf "%.2f" "$STOCKS_TOTAL")
          CRYPTO_TOTAL=$(printf "%.2f" "$CRYPTO_TOTAL")
          TOTAL=$(echo "$CASH + $STOCKS_TOTAL + $CRYPTO_TOTAL + $REALESTATE + $PENSION" | bc)

          echo "=== Summary ==="
          echo "Cash: $CASH"
          echo "Stocks: $STOCKS_TOTAL"
          echo "Crypto: $CRYPTO_TOTAL"
          echo "Real Estate: $REALESTATE"
          echo "Pension: $PENSION"
          echo "Total: $TOTAL"

          # Update data.json (no holdings/quantities saved)
          jq --argjson stocks "$STOCKS_TOTAL" \
             --argjson crypto "$CRYPTO_TOTAL" \
             --arg date "$DATE" \
             --argjson total "$TOTAL" \
             --argjson cash "$CASH" \
             --argjson realestate "$REALESTATE" \
             --argjson pension "$PENSION" \
             '.assets.stocks.amount = $stocks |
              .assets.crypto.amount = $crypto |
              .lastUpdated = $date |
              .history += [{"date": $date, "total": $total, "cash": $cash, "stocks": $stocks, "crypto": $crypto, "realestate": $realestate, "pension": $pension}]' \
             data.json > tmp.json && mv tmp.json data.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Daily price update: $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - uses: actions/configure-pages@v5
        if: steps.changes.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        if: steps.changes.outputs.changed == 'true'
