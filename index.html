<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immigration Finance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }

    /* Main Progress */
    .main-progress {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      text-align: center;
      border: 1px solid #2a2a4a;
    }
    .percent-display {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .amount-display {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 24px;
    }
    .amount-display .current {
      color: #667eea;
      font-weight: 600;
    }
    .progress-bar-container {
      background: #2a2a4a;
      border-radius: 12px;
      height: 24px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 12px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 1.5s ease-out;
      position: relative;
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Composition Bar */
    .composition-card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid #2a2a4a;
    }
    .composition-card h3 {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 16px;
    }
    .comp-bar {
      display: flex;
      height: 32px;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .comp-bar .segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      transition: width 1s ease-out;
    }
    .comp-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .comp-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .comp-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Asset Cards */
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .asset-card {
      background: #1a1a2e;
      border-radius: 14px;
      padding: 20px;
      border: 1px solid #2a2a4a;
      text-align: center;
    }
    .asset-card .icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .asset-card .label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
    }
    .asset-card .value {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .asset-card .asset-percent {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    /* History */
    .history-card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #2a2a4a;
    }
    .history-card h3 {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 16px;
    }
    .history-chart-wrapper {
      position: relative;
      width: 100%;
      height: 400px;
    }

    .updated {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Immigration Finance Tracker</h1>
  <p class="subtitle">미국 이민 목표 자산 추적</p>

  <div class="container">
    <!-- Main Progress -->
    <div class="main-progress">
      <div class="percent-display" id="percentDisplay">0%</div>
      <div class="amount-display" style="display:none">
        <span class="current" id="currentAmount">$0</span>
        <span> / </span>
        <span id="goalAmount">$1,000,000</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Composition Bar -->
    <div class="composition-card">
      <h3>자산 구성 비율</h3>
      <div class="comp-bar" id="compBar"></div>
      <div class="comp-legend" id="compLegend"></div>
    </div>

    <!-- Asset Cards -->
    <div class="assets-grid" id="assetsGrid"></div>

    <!-- History -->
    <div class="history-card">
      <h3>자산 추이</h3>
      <div class="history-chart-wrapper">
        <canvas id="historyChart"></canvas>
      </div>
    </div>

    <p class="updated" id="lastUpdated"></p>
  </div>

  <script>
    const ICONS = {
      cash: '',
      stocks: '',
      crypto: '',
      realestate: '',
      pension: ''
    };

    function formatUSD(n) {
      return '$' + n.toLocaleString('en-US');
    }

    async function loadData() {
      const res = await fetch('data.json?' + Date.now());
      return res.json();
    }

    function render(data) {
      const { goal, assets, history, lastUpdated } = data;
      const entries = Object.entries(assets);
      const total = entries.reduce((s, [, v]) => s + v.amount, 0);
      const percent = goal.amount > 0 ? (total / goal.amount * 100) : 0;

      // Main progress
      document.getElementById('percentDisplay').textContent = percent.toFixed(1) + '%';
      document.getElementById('currentAmount').textContent = formatUSD(total);
      document.getElementById('goalAmount').textContent = formatUSD(goal.amount);
      document.getElementById('progressBar').style.width = Math.min(percent, 100) + '%';

      // Asset cards
      const grid = document.getElementById('assetsGrid');
      grid.innerHTML = '';
      entries.forEach(([key, asset]) => {
        const card = document.createElement('div');
        card.className = 'asset-card';
        const pct = goal.amount > 0 ? (asset.amount / goal.amount * 100).toFixed(1) : '0.0';
        const icon = ICONS[key] || '';
        card.innerHTML = `
          <div class="label">${asset.label}</div>
          <div class="value" style="color:${asset.color}">${pct}%</div>
        `;
        grid.appendChild(card);
      });

      // Composition bar
      const compBar = document.getElementById('compBar');
      const compLegend = document.getElementById('compLegend');
      entries.forEach(([, asset]) => {
        const pct = total > 0 ? (asset.amount / total * 100) : 0;
        if (pct > 0) {
          const seg = document.createElement('div');
          seg.className = 'segment';
          seg.style.width = pct + '%';
          seg.style.backgroundColor = asset.color;
          seg.textContent = pct >= 5 ? pct.toFixed(1) + '%' : '';
          seg.title = asset.label + ' ' + pct.toFixed(1) + '%';
          compBar.appendChild(seg);
        }
        const item = document.createElement('div');
        item.className = 'comp-legend-item';
        const pctGoal = goal.amount > 0 ? (asset.amount / goal.amount * 100).toFixed(1) : '0.0';
        item.innerHTML = '<div class="comp-legend-dot" style="background:' + asset.color + '"></div>' + asset.label + ' ' + pctGoal + '%';
        compLegend.appendChild(item);
      });

      // Generate monthly historical data
      const milestones = data.milestones || [];
      const currentStocks = assets.stocks.amount;
      const currentCrypto = assets.crypto.amount;
      const currentRealestate = assets.realestate.amount;
      const currentPension = assets.pension ? assets.pension.amount : 0;
      const cashAmount = assets.cash.amount;

      function lerp(a, b, t) { return a + (b - a) * t; }
      function monthIdx(y, m) { return (y - 2000) * 12 + m; }
      function toLabel(idx) {
        const y = 2000 + Math.floor(idx / 12);
        const m = idx % 12;
        return y + '-' + String(m + 1).padStart(2, '0');
      }

      const endIdx = monthIdx(2026, 2); // 2026-03 (0-indexed month 2)
      const totalMonths = endIdx + 1;

      const cashData = [];
      const stockData = [];
      const cryptoData = [];
      const realestateData = [];
      const pensionData = [];
      const timeLabels = [];

      for (let i = 0; i < totalMonths; i++) {
        timeLabels.push(toLabel(i));

        // Cash: constant
        cashData.push(cashAmount);

        // Stocks: 2000-01 start $1,000
        // Gradual growth to $30,000 by 2017-01
        // 2017-06 spike to $300,000
        // 2018-06 crash to $30,000
        // 2018-06 to 2026-03 steady growth to current
        const sStart = monthIdx(2000, 0);
        const sGrow1 = monthIdx(2017, 0);
        const sPeak = monthIdx(2017, 5);
        const sCrash = monthIdx(2018, 5);
        const sEnd = endIdx;
        let sv = 0;
        if (i < sStart) { sv = 0; }
        else if (i <= sGrow1) { sv = lerp(1000, 30000, (i - sStart) / (sGrow1 - sStart)); }
        else if (i <= sPeak) { sv = lerp(30000, 300000, (i - sGrow1) / (sPeak - sGrow1)); }
        else if (i <= sCrash) { sv = lerp(300000, 30000, (i - sPeak) / (sCrash - sPeak)); }
        else { sv = lerp(30000, currentStocks, (i - sCrash) / (sEnd - sCrash)); }
        stockData.push(Math.round(sv));

        // Crypto: 2016-01 start small, steady growth to current
        const cStart = monthIdx(2016, 0);
        let cv = 0;
        if (i >= cStart) {
          cv = lerp(500, currentCrypto, (i - cStart) / (endIdx - cStart));
        }
        cryptoData.push(Math.round(cv));

        // Real estate: 2014-01 purchase at $270,000, grow to current
        const rStart = monthIdx(2014, 0);
        let rv = 0;
        if (i >= rStart) {
          rv = lerp(270000, currentRealestate, (i - rStart) / (endIdx - rStart));
        }
        realestateData.push(Math.round(rv));

        // Pension: compound growth from 2000 to current (~7% annual)
        const pStart = monthIdx(2000, 0);
        let pv = 0;
        if (i >= pStart) {
          const t = (i - pStart) / (endIdx - pStart); // 0 to 1
          // Exponential curve: slow start, accelerating growth
          const annualRate = 0.07;
          const totalYears = (endIdx - pStart) / 12;
          const elapsed = t * totalYears;
          pv = currentPension * (Math.pow(1 + annualRate, elapsed) - 1) / (Math.pow(1 + annualRate, totalYears) - 1);
        }
        pensionData.push(Math.round(pv));
      }

      // Milestone annotations
      const MILESTONE_COLORS = ['#4CAF50', '#2196F3', '#FF9800', '#E91E63'];
      const annotations = {};
      milestones.forEach((m, i) => {
        const idx = monthIdx(m.year, 0);
        const color = MILESTONE_COLORS[i % MILESTONE_COLORS.length];
        annotations['line' + i] = {
          type: 'line',
          xMin: idx,
          xMax: idx,
          borderColor: color,
          borderWidth: 2,
          borderDash: [6, 4],
          label: {
            display: true,
            content: m.label,
            position: 'start',
            backgroundColor: color,
            color: '#fff',
            font: { size: 10, weight: 'bold' },
            padding: { top: 3, bottom: 3, left: 6, right: 6 },
            borderRadius: 4,
            yAdjust: i % 2 === 0 ? -10 : 20
          }
        };
      });
      // Goal line
      annotations['goalLine'] = {
        type: 'line',
        yMin: goal.amount,
        yMax: goal.amount,
        borderColor: 'rgba(255, 82, 82, 0.6)',
        borderWidth: 2,
        borderDash: [8, 4],
        label: {
          display: true,
          content: 'GOAL 100%',
          position: 'end',
          backgroundColor: 'rgba(255, 82, 82, 0.8)',
          color: '#fff',
          font: { size: 11 },
          padding: { top: 3, bottom: 3, left: 6, right: 6 },
          borderRadius: 4
        }
      };

      // Total line data
      const totalData = cashData.map((v, i) => v + stockData[i] + cryptoData[i] + realestateData[i] + pensionData[i]);

      new Chart(document.getElementById('historyChart'), {
        type: 'line',
        data: {
          labels: timeLabels,
          datasets: [
            {
              label: 'Total',
              data: totalData,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              borderWidth: 3
            },
            {
              label: '부동산',
              data: realestateData,
              borderColor: assets.realestate.color,
              tension: 0.3,
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false
            },
            {
              label: '주식',
              data: stockData,
              borderColor: assets.stocks.color,
              tension: 0.3,
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false
            },
            {
              label: '암호화폐',
              data: cryptoData,
              borderColor: assets.crypto.color,
              tension: 0.3,
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false
            },
            {
              label: '연금',
              data: pensionData,
              borderColor: assets.pension ? assets.pension.color : '#78D9E8',
              tension: 0.3,
              pointRadius: 0,
              borderWidth: 1.5,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              ticks: {
                color: '#888',
                maxRotation: 45,
                callback: function(val, idx) {
                  const lbl = this.getLabelForValue(idx);
                  if (!lbl) return '';
                  return lbl.endsWith('-01') ? lbl.substring(0, 4) : '';
                },
                maxTicksLimit: 14
              },
              grid: { color: '#2a2a4a' }
            },
            y: {
              min: 0,
              ticks: { color: '#888', callback: v => goal.amount > 0 ? Math.round(v / goal.amount * 100) + '%' : v },
              grid: { color: '#2a2a4a' }
            }
          },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#aaa', padding: 12, font: { size: 11 } }
            },
            tooltip: {
              callbacks: {
                title: ctx => ctx[0].label,
                label: ctx => ctx.dataset.label + ': ' + (goal.amount > 0 ? (ctx.raw / goal.amount * 100).toFixed(1) : 0) + '%'
              }
            },
            annotation: { annotations }
          }
        }
      });

      document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + lastUpdated;
    }

    loadData().then(render);
  </script>
</body>
</html>
