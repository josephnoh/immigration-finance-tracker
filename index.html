<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immigration Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #08081a;
      color: #e2e2e2;
      min-height: 100vh;
      padding: 48px 24px 60px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(102,126,234,0.08) 0%, rgba(118,75,162,0.04) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }
    .header-left h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f0;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .header-left .subtitle {
      font-size: 0.8rem;
      font-weight: 400;
      color: #666;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #555;
      text-decoration: none;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #667eea; }
    .header-right {
      font-size: 0.75rem;
      color: #555;
      text-align: right;
    }

    /* Card base — glassmorphism */
    .card {
      background: rgba(17, 17, 40, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    }
    .card:hover {
      border-color: rgba(102,126,234,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(102,126,234,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .card-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    /* Hero: Progress Ring */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 28px;
    }
    .progress-ring-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
    }
    .progress-ring-wrap svg {
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: #1e1e3a;
      stroke-width: 10;
    }
    .ring-fill {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease-out;
      filter: drop-shadow(0 0 8px rgba(102,126,234,0.4));
    }
    .ring-percent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-percent .value {
      font-size: 2.8rem;
      font-weight: 800;
      color: #f0f0f0;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .ring-percent .label {
      font-size: 0.7rem;
      color: #666;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
    .amount-display { display: none; }

    /* KPI Stats Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      margin-bottom: 20px;
      background: rgba(17, 17, 40, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    }
    .kpi-row:hover {
      border-color: rgba(102,126,234,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(102,126,234,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .kpi-item {
      padding: 22px 16px;
      text-align: center;
      position: relative;
      transition: background 0.2s;
      cursor: default;
    }
    .kpi-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(255,255,255,0.05);
    }
    .kpi-item:hover {
      background: rgba(255,255,255,0.02);
    }
    .kpi-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin: 0 auto 8px;
    }
    .kpi-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .kpi-value {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Composition Bar */
    .comp-bar-wrap {
      padding: 24px 28px;
    }
    .comp-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 14px;
      background: #1a1a35;
    }
    .comp-bar .segment {
      height: 100%;
      transition: width 1s ease-out;
    }
    .comp-bar .segment:first-child {
      border-radius: 4px 0 0 4px;
    }
    .comp-bar .segment:last-child {
      border-radius: 0 4px 4px 0;
    }
    .comp-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .comp-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #777;
      font-weight: 500;
    }
    .comp-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Chart Section */
    .chart-card {
      padding: 28px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
    }
    .tab-group {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px;
    }
    .tab {
      background: none;
      border: none;
      color: #666;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover {
      color: #aaa;
    }
    .tab.active {
      background: #667eea;
      color: #fff;
      box-shadow: 0 2px 8px rgba(102,126,234,0.3);
    }
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 420px;
    }
    .show-all-btn {
      display: block;
      margin: 12px auto 0;
      padding: 6px 20px;
      background: rgba(102,126,234,0.12);
      border: 1px solid rgba(102,126,234,0.25);
      border-radius: 8px;
      color: #667eea;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .show-all-btn:hover {
      background: rgba(102,126,234,0.2);
      border-color: rgba(102,126,234,0.4);
    }

    /* Footer */
    .footer {
      text-align: center;
      color: #444;
      font-size: 0.7rem;
      font-weight: 400;
      margin-top: 24px;
      letter-spacing: 0.02em;
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding: 24px 16px 40px; }
      .hero { padding: 28px 20px; }
      .progress-ring-wrap { width: 160px; height: 160px; }
      .ring-percent .value { font-size: 2.2rem; }
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
      .kpi-item:nth-child(3)::after { display: none; }
      .kpi-item:nth-child(4), .kpi-item:nth-child(5) {
        border-top: 1px solid rgba(255,255,255,0.05);
      }
      .chart-wrap { height: 320px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <a href="https://josephnoh.github.io/" class="back-link">← josephnoh.github.io</a>
    <div class="header">
      <div class="header-left">
        <h1>Finance Tracker</h1>
        <div class="subtitle">Immigration Goal Progress</div>
      </div>
      <div class="header-right" id="lastUpdated"></div>
    </div>

    <!-- Hero: Progress Ring -->
    <div class="card hero">
      <div class="card-label">Goal Progress</div>
      <div class="progress-ring-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#667eea"/>
              <stop offset="100%" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="85"/>
          <circle class="ring-fill" id="progressRing" cx="100" cy="100" r="85"
            stroke-dasharray="534.07" stroke-dashoffset="534.07"/>
        </svg>
        <div class="ring-percent">
          <div class="value" id="percentDisplay">0%</div>
          <div class="label">of target</div>
        </div>
      </div>
      <div class="amount-display">
        <span class="current" id="currentAmount">$0</span>
        <span> / </span>
        <span id="goalAmount">$1,000,000</span>
      </div>
    </div>

    <!-- KPI Stats Row -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- Composition Bar -->
    <div class="card comp-bar-wrap">
      <div class="card-label">Asset Allocation</div>
      <div class="comp-bar" id="compBar"></div>
      <div class="comp-legend" id="compLegend"></div>
    </div>

    <!-- Chart -->
    <div class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">Portfolio Trend</div>
        <div class="tab-group">
          <button class="tab active" data-range="1w">1W</button>
          <button class="tab" data-range="1m">1M</button>
          <button class="tab" data-range="all">All</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="historyChart"></canvas>
      </div>
      <button class="show-all-btn" id="showAllBtn" style="display:none;">Show All</button>
    </div>

    <div class="footer" id="footerUpdated"></div>
    <div style="text-align: center; font-size: 0.65rem; color: #444; margin-top: 8px; padding-bottom: 16px;">This page is automatically updated daily.</div>
  </div>

  <script>
    function formatUSD(n) {
      return '$' + n.toLocaleString('en-US');
    }

    async function loadData() {
      const res = await fetch('data.json?' + Date.now());
      return res.json();
    }

    function render(data) {
      const { goal, assets, history, lastUpdated } = data;
      const entries = Object.entries(assets);
      const total = entries.reduce((s, [, v]) => s + v.amount, 0);
      const percent = goal.amount > 0 ? (total / goal.amount * 100) : 0;

      // Progress ring
      document.getElementById('percentDisplay').textContent = percent.toFixed(1) + '%';
      document.getElementById('currentAmount').textContent = formatUSD(total);
      document.getElementById('goalAmount').textContent = formatUSD(goal.amount);
      const circumference = 2 * Math.PI * 85; // 534.07
      const offset = circumference * (1 - Math.min(percent, 100) / 100);
      setTimeout(() => {
        document.getElementById('progressRing').style.strokeDashoffset = offset;
      }, 100);

      // KPI row
      const kpiRow = document.getElementById('kpiRow');
      kpiRow.innerHTML = '';
      entries.forEach(([key, asset]) => {
        const pct = goal.amount > 0 ? (asset.amount / goal.amount * 100).toFixed(1) : '0.0';
        const item = document.createElement('div');
        item.className = 'kpi-item';
        item.innerHTML = `
          <div class="kpi-dot" style="background:${asset.color}"></div>
          <div class="kpi-label">${asset.label}</div>
          <div class="kpi-value" style="color:${asset.color}">${pct}%</div>
        `;
        kpiRow.appendChild(item);
      });

      // Composition bar
      const compBar = document.getElementById('compBar');
      const compLegend = document.getElementById('compLegend');
      entries.forEach(([, asset]) => {
        const pct = total > 0 ? (asset.amount / total * 100) : 0;
        if (pct > 0) {
          const seg = document.createElement('div');
          seg.className = 'segment';
          seg.style.width = pct + '%';
          seg.style.backgroundColor = asset.color;
          seg.title = asset.label + ' ' + pct.toFixed(1) + '%';
          compBar.appendChild(seg);
        }
        const item = document.createElement('div');
        item.className = 'comp-legend-item';
        const pctOfTotal = total > 0 ? (asset.amount / total * 100).toFixed(1) : '0.0';
        item.innerHTML = '<div class="comp-legend-dot" style="background:' + asset.color + '"></div>' + asset.label + ' ' + pctOfTotal + '%';
        compLegend.appendChild(item);
      });

      // Chart
      let historyChart = null;
      const milestones = data.milestones || [];
      const currentStocks = assets.stocks.amount;
      const currentCrypto = assets.crypto.amount;
      const currentRealestate = assets.realestate.amount;
      const currentPension = assets.pension ? assets.pension.amount : 0;
      const cashAmount = assets.cash.amount;

      function lerp(a, b, t) { return a + (b - a) * t; }
      function monthIdx(y, m) { return (y - 2000) * 12 + m; }
      function toLabel(idx) {
        const y = 2000 + Math.floor(idx / 12);
        const m = idx % 12;
        return y + '-' + String(m + 1).padStart(2, '0');
      }

      function buildAllData() {
        const endIdx = monthIdx(2026, 2);
        const totalMonths = endIdx + 1;
        const labels = [], cash = [], stock = [], crypto = [], re = [], pen = [];

        for (let i = 0; i < totalMonths; i++) {
          labels.push(toLabel(i));
          cash.push(cashAmount);

          const sStart = monthIdx(2000, 0), sGrow1 = monthIdx(2017, 0);
          const sPeak = monthIdx(2017, 5), sCrash = monthIdx(2018, 5);
          let sv = 0;
          if (i <= sGrow1) sv = lerp(1000, 30000, (i - sStart) / (sGrow1 - sStart));
          else if (i <= sPeak) sv = lerp(30000, 300000, (i - sGrow1) / (sPeak - sGrow1));
          else if (i <= sCrash) sv = lerp(300000, 30000, (i - sPeak) / (sCrash - sPeak));
          else sv = lerp(30000, currentStocks, (i - sCrash) / (endIdx - sCrash));
          stock.push(Math.round(sv));

          const cStart = monthIdx(2016, 0);
          crypto.push(i >= cStart ? Math.round(lerp(500, currentCrypto, (i - cStart) / (endIdx - cStart))) : 0);

          const rStart = monthIdx(2014, 0);
          re.push(i >= rStart ? Math.round(lerp(270000, currentRealestate, (i - rStart) / (endIdx - rStart))) : 0);

          const pStart = monthIdx(2000, 0);
          if (i >= pStart) {
            const t = (i - pStart) / (endIdx - pStart);
            const totalYears = (endIdx - pStart) / 12;
            const elapsed = t * totalYears;
            pen.push(Math.round(currentPension * (Math.pow(1.07, elapsed) - 1) / (Math.pow(1.07, totalYears) - 1)));
          } else { pen.push(0); }
        }
        const total = cash.map((v, i) => v + stock[i] + crypto[i] + re[i] + pen[i]);
        return { labels, cash, stock, crypto, re, pen, total };
      }

      function build1MData() {
        const h = history || [];
        const labels = [], cash = [], stock = [], crypto = [], re = [], pen = [], total = [];
        h.forEach(entry => {
          labels.push(entry.date.substring(5));
          total.push(entry.total);
          cash.push(entry.cash != null ? entry.cash : cashAmount);
          stock.push(entry.stocks != null ? entry.stocks : currentStocks);
          crypto.push(entry.crypto != null ? entry.crypto : currentCrypto);
          re.push(entry.realestate != null ? entry.realestate : currentRealestate);
          pen.push(entry.pension != null ? entry.pension : currentPension);
        });
        return { labels, cash, stock, crypto, re, pen, total };
      }

      function build1WData() {
        const h = history || [];
        const recent = h.slice(-7);
        const labels = [], cash = [], stock = [], crypto = [], re = [], pen = [], total = [];
        recent.forEach(entry => {
          labels.push(entry.date.substring(5));
          total.push(entry.total);
          cash.push(entry.cash != null ? entry.cash : cashAmount);
          stock.push(entry.stocks != null ? entry.stocks : currentStocks);
          crypto.push(entry.crypto != null ? entry.crypto : currentCrypto);
          re.push(entry.realestate != null ? entry.realestate : currentRealestate);
          pen.push(entry.pension != null ? entry.pension : currentPension);
        });
        return { labels, cash, stock, crypto, re, pen, total };
      }

      function createChart(mode) {
        if (historyChart) { historyChart.destroy(); }
        const isAll = mode === 'all';
        const d = isAll ? buildAllData() : mode === '1w' ? build1WData() : build1MData();

        const annotations = {};
        if (isAll) {
          const MILESTONE_COLORS = ['#4CAF50', '#2196F3', '#FF9800', '#E91E63'];
          milestones.forEach((m, i) => {
            const idx = monthIdx(m.year, 0);
            const color = MILESTONE_COLORS[i % MILESTONE_COLORS.length];
            annotations['line' + i] = {
              type: 'line', xMin: idx, xMax: idx,
              borderColor: color, borderWidth: 2, borderDash: [6, 4],
              label: {
                display: true, content: m.label, position: 'end',
                backgroundColor: color, color: '#fff',
                font: { size: 10, weight: 'bold', family: 'Inter' },
                padding: { top: 3, bottom: 3, left: 6, right: 6 },
                borderRadius: 4,
                yAdjust: -(20 + i * 22)
              }
            };
          });
          annotations['goalLine'] = {
            type: 'line', yMin: goal.amount, yMax: goal.amount,
            borderColor: 'rgba(255, 82, 82, 0.5)', borderWidth: 1.5, borderDash: [8, 4],
            label: {
              display: true, content: 'GOAL', position: 'end',
              backgroundColor: 'rgba(255, 82, 82, 0.7)', color: '#fff',
              font: { size: 10, family: 'Inter' },
              padding: { top: 2, bottom: 2, left: 6, right: 6 }, borderRadius: 4
            }
          };
        }

        historyChart = new Chart(document.getElementById('historyChart'), {
          type: 'line',
          data: {
            labels: d.labels,
            datasets: [
              { label: 'Total', data: d.total, borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.06)', fill: true, tension: 0.4, pointRadius: isAll ? 0 : 2, borderWidth: 2.5, pointBackgroundColor: '#667eea' },
              { label: assets.realestate.label, data: d.re, borderColor: assets.realestate.color, tension: 0.4, pointRadius: isAll ? 0 : 1.5, borderWidth: 1.5, fill: false },
              { label: assets.stocks.label, data: d.stock, borderColor: assets.stocks.color, tension: 0.4, pointRadius: isAll ? 0 : 1.5, borderWidth: 1.5, fill: false },
              { label: assets.crypto.label, data: d.crypto, borderColor: assets.crypto.color, tension: 0.4, pointRadius: isAll ? 0 : 1.5, borderWidth: 1.5, fill: false },
              { label: assets.pension.label, data: d.pen, borderColor: assets.pension.color, tension: 0.4, pointRadius: isAll ? 0 : 1.5, borderWidth: 1.5, fill: false }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: isAll ? 10 : 0 } },
            scales: {
              x: {
                ticks: {
                  color: '#555', font: { size: 11, family: 'Inter' }, maxRotation: 0,
                  callback: isAll
                    ? function(val, idx) { const lbl = this.getLabelForValue(idx); return lbl && lbl.endsWith('-01') ? lbl.substring(0, 4) : ''; }
                    : function(val, idx) { return this.getLabelForValue(idx); },
                  maxTicksLimit: isAll ? 12 : 8
                },
                grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }
              },
              y: {
                min: 0,
                ticks: {
                  color: '#555', font: { size: 11, family: 'Inter' },
                  callback: v => goal.amount > 0 ? Math.round(v / goal.amount * 100) + '%' : v
                },
                grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }
              }
            },
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  color: '#777', padding: 16,
                  font: { size: 11, family: 'Inter', weight: '500' },
                  usePointStyle: true, pointStyle: 'circle', boxWidth: 8, boxHeight: 8
                },
                onClick: function(e, legendItem, legend) {
                  const ci = legend.chart;
                  const idx = legendItem.datasetIndex;
                  const allVisible = ci.data.datasets.every((_, i) => ci.isDatasetVisible(i));
                  const allHidden = ci.data.datasets.every((ds, i) => i === idx ? false : !ci.isDatasetVisible(i));
                  if (allHidden) {
                    ci.data.datasets.forEach((_, i) => { ci.setDatasetVisibility(i, true); });
                    document.getElementById('showAllBtn').style.display = 'none';
                  } else {
                    ci.data.datasets.forEach((_, i) => { ci.setDatasetVisibility(i, i === idx); });
                    document.getElementById('showAllBtn').style.display = 'block';
                  }
                  ci.update();
                }
              },
              tooltip: {
                backgroundColor: 'rgba(17,17,40,0.95)',
                borderColor: 'rgba(255,255,255,0.08)',
                borderWidth: 1,
                titleFont: { family: 'Inter', size: 12, weight: '600' },
                bodyFont: { family: 'Inter', size: 11 },
                padding: 12,
                cornerRadius: 8,
                callbacks: {
                  title: ctx => ctx[0].label,
                  label: ctx => ' ' + ctx.dataset.label + '  ' + (goal.amount > 0 ? (ctx.raw / goal.amount * 100).toFixed(1) : 0) + '%'
                }
              },
              annotation: { annotations }
            }
          }
        });
      }

      // Tab switching
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          createChart(btn.dataset.range);
        });
      });

      // Show All button
      document.getElementById('showAllBtn').addEventListener('click', () => {
        if (historyChart) {
          historyChart.data.datasets.forEach((_, i) => { historyChart.setDatasetVisibility(i, true); });
          historyChart.update();
          document.getElementById('showAllBtn').style.display = 'none';
        }
      });

      createChart('1w');

      // Footer
      document.getElementById('lastUpdated').textContent = 'Updated ' + lastUpdated;
      document.getElementById('footerUpdated').textContent = 'Last synced ' + lastUpdated;
    }

    loadData().then(render);
  </script>
</body>
</html>
